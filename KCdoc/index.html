// ── Spaced repetition helpers ──────────────────────────────────────────────
function nextReview(level) {
  const days = [0, 1, 3, 7, 14, 30];
  const d = days[Math.min(level, days.length - 1)];
  const t = new Date();
  t.setDate(t.getDate() + d);
  t.setHours(0, 0, 0, 0);
  return t.getTime();
}

function isDueToday(word) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return !word.nextReview || word.nextReview <= now.getTime();
}

function randEx(w) {
  const exs = w.examples;
  if (!exs || exs.length === 0) return { sentence: w.example || "", translation: "", source: "" };
  return exs[Math.floor(Math.random() * exs.length)];
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function lookupWord(word) {
  const prompt = `Look up the English word or phrase "${word}" and return ONLY a JSON object (no markdown, no explanation) with this exact structure:
{
  "word": "${word}",
  "pos": "part of speech abbreviation (n./v./adj./adv./phrase etc.)",
  "definitions": ["definition 1 in Traditional Chinese", "definition 2 if exists"],
  "examples": [
    {
      "sentence": "A real or realistic example sentence inspired by news, journalism or current affairs (e.g. The Economist, NYT, BBC)",
      "translation": "Traditional Chinese translation",
      "source": "Source name e.g. The Economist"
    },
    {
      "sentence": "Another example sentence from a different domain such as science, academia or literature",
      "translation": "Traditional Chinese translation",
      "source": "Source name e.g. Scientific American"
    },
    {
      "sentence": "A third example sentence from yet another context such as business, politics or culture",
      "translation": "Traditional Chinese translation",
      "source": "Source name e.g. Financial Times"
    }
  ],
  "roots": [{"root": "root or prefix/suffix", "meaning": "what it means in Chinese"}],
  "related": ["related word 1", "related word 2", "related word 3"]
}`;

  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  const text = data.content.map((b) => b.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

// ── Notion Sync ────────────────────────────────────────────────────────────
const NOTION_DB_ID = "63917643-ebac-41e1-b8a9-8db603f9d25c";
const NOTION_DS_ID = "c54e4878-6eff-4e39-924e-77891b1dd848";
const LEVEL_LABEL = ["🔴 新學","🟠 學習中","🟠 學習中","🟢 熟悉","🟢 熟悉","✅ 已掌握"];

// Fetch all words from Notion
async function fetchFromNotion() {
  const prompt = `Use the Notion MCP to query all pages in the WordDeck database with database_id "${NOTION_DB_ID}". Return ONLY a JSON array (no markdown) of objects with these fields from each page:
{ "notionId": "<page id>", "word": "<單字>", "pos": "<詞性>", "definitions": ["<字義 split by ；>"], "example": "<第一個例句>", "examples": [], "roots": [], "related": [], "level": <0-5 based on 學習程度: 🔴=0,🟠=1,🟢=3,✅=5>, "nextReview": <unix ms timestamp from 下次複習 date or 0> }
Return [] if database is empty.`;
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
    }),
  });
  const data = await res.json();
  const text = data.content.map(b => b.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const match = clean.match(/\[[\s\S]*\]/);
  if (!match) return [];
  const arr = JSON.parse(match[0]);
  return arr.map((w, i) => ({ ...w, id: w.notionId || Date.now() + i }));
}

// Add word to Notion
async function addToNotion(wordData) {
  const today = new Date().toISOString().split("T")[0];
  const nextReviewDate = new Date(nextReview(0)).toISOString().split("T")[0];
  const prompt = `Use the Notion MCP to create a page in the WordDeck database (data_source_id: "${NOTION_DS_ID}") with these exact properties:
- 單字 (title): "${wordData.word}"
- 詞性: "${wordData.pos}"
- 字義: "${wordData.definitions?.join("；")}"
- 例句: "${wordData.examples?.map(e => "[" + e.source + "] " + e.sentence).join(" ／ ") || wordData.example || ""}"
- 例句翻譯: "${wordData.examples?.map(e => e.translation).join(" ／ ") || wordData.exampleTranslation || ""}"
- 字根字詞: "${wordData.roots?.map(r => r.root + "（" + r.meaning + "）").join("、") || ""}"
- 相關單字: "${wordData.related?.join("、") || ""}"
- 學習程度: "🔴 新學"
- 加入日期: "${today}"
- 下次複習: "${nextReviewDate}"
Call notion create-pages now. Return the new page id only.`;
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 500,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
    }),
  });
  const data = await res.json();
  const text = data.content.map(b => b.text || "").join("");
  const idMatch = text.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
  return idMatch ? idMatch[0] : null;
}

// Update word level + nextReview in Notion
async function updateInNotion(notionId, level) {
  const nextReviewDate = new Date(nextReview(level)).toISOString().split("T")[0];
  const prompt = `Use Notion MCP to update page "${notionId}" with:
- 學習程度: "${LEVEL_LABEL[Math.min(level,5)]}"
- 下次複習: "${nextReviewDate}"
Call notion update-page now.`;
  await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
    }),
  });
}

// Delete word from Notion
async function deleteFromNotion(notionId) {
  const prompt = `Use Notion MCP to archive (delete) page with id "${notionId}". Call the tool now.`;
  await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },

}

// ── Text-to-Speech ─────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function SpeakBtn({ text, style: s }) {
  const [speaking, setSpeaking] = useState(false);
  const handle = (e) => {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.9;
    u.onstart = () => setSpeaking(true);
    u.onend = () => setSpeaking(false);
    window.speechSynthesis.speak(u);
  };
  return (
    <button onClick={handle} style={{
      background: speaking ? "rgba(232,197,71,0.2)" : "rgba(255,255,255,0.06)",
      border: `1px solid ${speaking ? "var(--accent)" : "var(--border)"}`,
      borderRadius: 8, padding: "5px 10px", cursor: "pointer",
      color: speaking ? "var(--accent)" : "var(--muted)",
      fontSize: 16, lineHeight: 1, transition: "all 0.2s", ...s
    }}>
      {speaking ? "🔊" : "🔈"}
    </button>
  );
}

const LOCAL_KEY = "worddeck_v3";

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY)) || null; } catch { return null; }
}
function saveLocal(w) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(w)); } catch {}
}

async function loadFromRedis() {
  try {
    const res = await fetch("/api/words");
    if (!res.ok) return null;
    const data = await res.json();
    return Array.isArray(data) && data.length > 0 ? data : null;
  } catch { return null; }
}
async function saveToRedis(words) {
  try {
    await fetch("/api/words", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(words)
    });
  } catch {}
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("search");
  const [syncMsg, setSyncMsg] = useState("");

  // Merge seed with local progress (level, nextReview)
  const [words, setWords] = useState(() => {
    const local = loadLocal();
    if (local && local.length > 0) return local;
    return NOTION_SEED;
  });

  useEffect(() => {
    loadFromRedis().then(w => { if (w) { setWords(w); saveLocal(w); } });
  }, []);

  const persistWords = (w) => { setWords(w); saveLocal(w); saveToRedis(w); };

  const addWord = async (wordData) => {
    if (words.find(w => w.word.toLowerCase() === wordData.word.toLowerCase())) return false;
    setSyncMsg("⏳ 存入 Notion...");
    const notionId = await addToNotion(wordData).catch(() => null);
    const newWord = { ...wordData, id: notionId || Date.now(), notionId, level: 0, nextReview: nextReview(0), addedAt: Date.now() };
    persistWords([newWord, ...words]);
    setSyncMsg("✓ 已同步");
    setTimeout(() => setSyncMsg(""), 2000);
    return true;
  };

  const updateWord = (id, updates) => {
    const updated = words.map(w => w.id === id ? { ...w, ...updates } : w);
    persistWords(updated);
    const word = words.find(w => w.id === id);
    if (word?.notionId && updates.level !== undefined) {
      updateInNotion(word.notionId, updates.level).catch(() => {});
    }
  };

  const deleteWord = (id) => {
    const word = words.find(w => w.id === id);
    persistWords(words.filter(w => w.id !== id));
    if (word?.notionId) deleteFromNotion(word.notionId).catch(() => {});
  };

  const dueWords = words.filter(isDueToday);



  return (
    <>
      <style>{style}</style>
      <div className="app">
        <div className="nav">
          <span className="nav-title">WordDeck</span>
          {syncMsg ? <span className="nav-badge">{syncMsg}</span> : dueWords.length > 0 && <span className="nav-badge">📅 {dueWords.length} due today</span>}
        </div>

        {tab === "search" && <SearchPage words={words} addWord={addWord} />}
        {tab === "cards" && <FlashcardPage words={words} updateWord={updateWord} />}
        {tab === "spell" && <SpellingPage words={words} updateWord={updateWord} />}
        {tab === "fill" && <FillPage words={words} updateWord={updateWord} />}
        {tab === "daily" && <DailyPage words={dueWords} updateWord={updateWord} />}
        {tab === "list" && <ListPage words={words} deleteWord={deleteWord} />}

        <div className="tabs">
          {[
            { id: "search", label: "查單字", icon: icons.search },
            { id: "cards", label: "翻轉卡", icon: icons.cards },
            { id: "spell", label: "拼字", icon: icons.spell },
            { id: "fill", label: "填字", icon: icons.fill },
            { id: "daily", label: "每日", icon: icons.daily },
            { id: "list", label: "單字表", icon: icons.list },
          ].map(t => (
            <button key={t.id} className={`tab${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

// ── Search Page ────────────────────────────────────────────────────────────
function SearchPage({ words, addWord }) {
  const [query, setQuery] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [saved, setSaved] = useState(false);

  const search = async (w) => {
    const term = (w || query).trim();
    if (!term) return;
    setLoading(true); setError(""); setResult(null); setSaved(false);
    try {
      const data = await lookupWord(term);
      setResult(data);
    } catch {
      setError("查詢失敗，請再試一次");
    }
    setLoading(false);
  };

  const handleSave = async () => {
    if (!result) return;
    const ok = await addWord(result);
    if (ok) setSaved(true);
  };

  const alreadySaved = result && words.some(w => w.word.toLowerCase() === result.word.toLowerCase());

  return (
    <div className="page">
      <div className="search-wrap">
        <input
          className="search-input"
          placeholder="輸入英文單字..."
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === "Enter" && search()}
        />
        <button className="search-btn" onClick={() => search()}>
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>

      {loading && <div className="loading"><div className="spinner"/><span>查詢中...</span></div>}
      {error && <div className="empty"><div className="empty-icon">⚠️</div><p>{error}</p></div>}

      {result && (
        <div className="word-result">
          <div className="word-header">
            <div style={{display:"flex", alignItems:"center", gap:12}}>
              <div className="word-en">{result.word}</div>
              <SpeakBtn text={result.word} />
            </div>
            <div className="word-pos">{result.pos}</div>
          </div>
          <div className="word-body">
            <div>
              <div className="section-label">字義</div>
              <ul className="definitions">{result.definitions.map((d, i) => <li key={i}>{d}</li>)}</ul>
            </div>
            <div>
              <div className="section-label">例句</div>
              {(result.examples || (result.example ? [{sentence: result.example, translation: result.exampleTranslation, source: ""}] : [])).map((ex, i) => (
                <div key={i} style={{marginBottom: i < (result.examples?.length - 1) ? 14 : 0}}>
                  {ex.source && <div style={{fontSize:10, color:"var(--accent2)", fontFamily:"'DM Mono',monospace", marginBottom:4, textTransform:"uppercase", letterSpacing:"1px"}}>📰 {ex.source}</div>}
                  <div className="example-en">"{ex.sentence}"</div>
                  <div className="example-zh">{ex.translation}</div>
                </div>
              ))}
            </div>
            {result.roots?.length > 0 && (
              <div>
                <div className="section-label">字根字詞</div>
                <div className="roots">
                  {result.roots.map((r, i) => (
                    <div key={i} className="root-tag"><span>{r.root}</span> {r.meaning}</div>
                  ))}
                </div>
              </div>
            )}
            {result.related?.length > 0 && (
              <div>
                <div className="section-label">相關單字</div>
                <div className="related">
                  {result.related.map((r, i) => (
                    <span key={i} className="related-tag" onClick={() => { setQuery(r); search(r); }}>{r}</span>
                  ))}
                </div>
              </div>
            )}
            <button
              className={`save-btn${saved || alreadySaved ? " saved" : ""}`}
              onClick={handleSave}
              disabled={saved || alreadySaved}
            >
              {saved || alreadySaved ? "✓ 已加入並同步 Notion" : "+ 加入單字表"}
            </button>
          </div>
        </div>
      )}

      {!result && !loading && !error && (
        <div className="empty">
          <div className="empty-icon">✦</div>
          <p>輸入單字開始查詢</p>
        </div>
      )}
    </div>
  );
}

// ── Flashcard Page ─────────────────────────────────────────────────────────
function FlashcardPage({ words, updateWord }) {
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [mode, setMode] = useState("all"); // all | due
  const exRef = useRef(null);

  const pool = mode === "due" ? words.filter(isDueToday) : words;

  if (pool.length === 0) return (
    <div className="page">
      <div className="mode-toggle">
        <button className={`mode-btn${mode==="all"?" active":""}`} onClick={() => setMode("all")}>全部單字</button>
        <button className={`mode-btn${mode==="due"?" active":""}`} onClick={() => setMode("due")}>今日複習</button>
      </div>
      <div className="empty"><div className="empty-icon">🃏</div><p>{mode==="due" ? "今天沒有要複習的單字" : "還沒有單字，先去查一個吧！"}</p></div>
    </div>
  );

  const w = pool[index % pool.length];
  if (!exRef.current || exRef.current.id !== w.id) exRef.current = { id: w.id, ex: randEx(w) };
  const curEx = exRef.current.ex;

  const next = () => { exRef.current = null; setFlipped(false); setTimeout(() => setIndex(i => (i + 1) % pool.length), 50); };
  const prev = () => { exRef.current = null; setFlipped(false); setTimeout(() => setIndex(i => (i - 1 + pool.length) % pool.length), 50); };

  const mark = (correct) => {
    const newLevel = correct ? Math.min(w.level + 1, 5) : Math.max(w.level - 1, 0);
    updateWord(w.id, { level: newLevel, nextReview: nextReview(newLevel) });
    next();
  };

  return (
    <div className="page">
      <div className="mode-toggle">
        <button className={`mode-btn${mode==="all"?" active":""}`} onClick={() => { setMode("all"); setIndex(0); setFlipped(false); }}>全部單字</button>
        <button className={`mode-btn${mode==="due"?" active":""}`} onClick={() => { setMode("due"); setIndex(0); setFlipped(false); }}>今日複習</button>
      </div>
      <div className="fc-progress">{(index % pool.length) + 1} / {pool.length}</div>
      <div className="progress-bar-wrap"><div className="progress-bar" style={{width:`${((index%pool.length)+1)/pool.length*100}%`}}/></div>

      <div className="flashcard-wrap" onClick={() => setFlipped(f => !f)}>
        <div className={`flashcard-inner${flipped ? " flipped" : ""}`}>
          <div className="flashcard-face flashcard-front">
            <div className="fc-word">{w.word}</div>
            <div className="fc-pos">{w.pos}</div>
            <SpeakBtn text={w.word} style={{marginTop:8}} />
            <div className="fc-example" style={{marginTop:12, fontSize:13}}>{curEx.sentence}</div>
            <div className="fc-hint" style={{marginTop:12}}>點擊翻轉</div>
          </div>
          <div className="flashcard-face flashcard-back">
            <div className="fc-word">{w.word}</div>
            <div className="fc-pos" style={{marginBottom:12}}>{w.pos}</div>
            <div className="fc-defs">{w.definitions?.join("；")}</div>
            <div className="fc-example" style={{marginTop:8}}>"{curEx.sentence}"</div>
          </div>
        </div>
      </div>

      {flipped ? (
        <div className="fc-actions">
          <button className="fc-btn wrong" onClick={() => mark(false)}>✗ 不熟</button>
          <button className="fc-btn right" onClick={() => mark(true)}>✓ 認識</button>
        </div>
      ) : (
        <div className="fc-nav">
          <button className="fc-nav-btn" onClick={prev}>← 上一個</button>
          <button className="fc-nav-btn" onClick={next}>下一個 →</button>
        </div>
      )}
    </div>
  );
}

      <div className="mode-toggle">
        <button className={`mode-btn${mode==="all"?" active":""}`} onClick={() => setMode("all")}>全部單字</button>
        <button className={`mode-btn${mode==="due"?" active":""}`} onClick={() => setMode("due")}>今日複習</button>
      </div>
      <div className="empty"><div className="empty-icon">✍️</div><p>{mode==="due" ? "今天沒有要複習的單字" : "還沒有單字，先去查一個吧！"}</p></div>
    </div>
  );

  const w = pool[index % pool.length];
  const target = w.word.toLowerCase();

  const press = (k) => {
    if (status) return;
    if (k === "⌫") { setInput(i => i.slice(0, -1)); return; }
    if (k === "✓") { check(); return; }
    if (k === "␣") k = " ";
    if (/^[a-z ]$/.test(k) && input.length < target.length) setInput(i => [...i, k]);
  };

  const check = () => {
    if (input.length !== target.length) return;
    const correct = input.join("") === target;
    setStatus(correct ? "correct" : "wrong");
    if (correct) updateWord(w.id, { level: Math.min(w.level+1,5), nextReview: nextReview(Math.min(w.level+1,5)) });
  };

  const next = () => { setInput([]); setStatus(null); setIndex(i => (i+1) % pool.length); };

  const inputRef = useRef(input);
  const statusRef = useRef(status);
  const targetRef = useRef(target);
  useEffect(() => { inputRef.current = input; }, [input]);
  useEffect(() => { statusRef.current = status; }, [status]);
  useEffect(() => { targetRef.current = target; }, [target]);

  useEffect(() => {
    if (mobile) return;
    const handler = (e) => {
      const curStatus = statusRef.current;
      const curTarget = targetRef.current;
      if (curStatus) {
        if (e.key === "Enter") { setInput([]); setStatus(null); setIndex(i => (i+1) % pool.length); }
        return;
      }
      if (e.key === "Backspace") { e.preventDefault(); setInput(i => i.slice(0,-1)); return; }
      if (e.key === "Enter") {
        setInput(cur => {
          if (cur.length !== curTarget.length) return cur;
          const correct = cur.join("") === curTarget;
          setStatus(correct ? "correct" : "wrong");
          if (correct) updateWord(w.id, { level: Math.min(w.level+1,5), nextReview: nextReview(Math.min(w.level+1,5)) });
          return cur;
        });
        return;
      }
      if (/^[a-zA-Z ]$/.test(e.key)) {
        setInput(cur => cur.length < curTarget.length ? [...cur, e.key === " " ? " " : e.key.toLowerCase()] : cur);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [mobile, w.id, w.level]);

  useEffect(() => { setInput([]); setStatus(null); }, [index]);

  return (
    <div className="page">
      <div className="mode-toggle">
        <button className={`mode-btn${mode==="all"?" active":""}`} onClick={() => { setMode("all"); setIndex(0); }}>全部單字</button>
        <button className={`mode-btn${mode==="due"?" active":""}`} onClick={() => { setMode("due"); setIndex(0); }}>今日複習</button>
      </div>
      <div className="fc-progress">{(index % pool.length) + 1} / {pool.length}</div>
      <div className="progress-bar-wrap"><div className="progress-bar" style={{width:`${((index%pool.length)+1)/pool.length*100}%`}}/></div>

      <div className="spell-word-display">
        <div className="spell-hint">{mobile ? "拼出這個單字" : "拼出這個單字（直接用鍵盤打，Enter 確認）"}</div>
        <div className="spell-definition">{w.definitions?.[0]}</div>
        <div className="spell-example">"{randEx(w).sentence}"</div>
      </div>

      <div className="letter-boxes">
        {Array.from({ length: target.length }).map((_, i) => {
          const letter = status ? target[i] : input[i] || "";
          let cls = "letter-box";
          if (status === "correct") cls += " correct";
          else if (status === "wrong") cls += input[i] === target[i] ? " correct" : " wrong";
          else if (input[i]) cls += " filled";
          return <div key={i} className={cls}>{letter.toUpperCase()}</div>;
        })}
      </div>

      {status ? (
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:24,marginBottom:8}}>{status==="correct"?"🎉 正確！":"😅 再試試"}</div>
          {status==="wrong"&&<div style={{color:"var(--muted)",marginBottom:12}}>正確答案：{target.toUpperCase()}</div>}
          <button className="save-btn" onClick={next}>下一個 → {!mobile && <span style={{fontSize:12,opacity:0.6}}>(Enter)</span>}</button>
        </div>
      ) : mobile ? (
        <div className="keyboard">
          {KEYBOARD.map((row, ri) => (
            <div key={ri} className="key-row">
              {row.map(k => <button key={k} className={`key${k.length>1?" wide":""}`} onClick={() => press(k)}>{k}</button>)}
            </div>
          ))}
        </div>
      ) : (
        <div style={{textAlign:"center", color:"var(--muted)", fontSize:13, padding:"20px 0", fontFamily:"'DM Mono',monospace"}}>
          ⌨️ 直接用鍵盤輸入
        </div>
      )}
    </div>
  );
}

// ── Daily Page ─────────────────────────────────────────────────────────────
function DailyPage({ words: dueWords, updateWord }) {
  const [mode, setMode] = useState("flash"); // flash | spell
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [done, setDone] = useState(false);

  if (dueWords.length === 0 || done) return (
    <div className="page">
      <div className="session-done">
        <div className="done-icon">🌟</div>
        <h2>今日完成！</h2>
        <p style={{marginTop:8}}>明天繼續保持！</p>
      </div>
    </div>
  );

  const w = dueWords[index];

  const mark = (correct) => {
    const newLevel = correct ? Math.min(w.level + 1, 5) : Math.max(w.level - 1, 0);
    updateWord(w.id, { level: newLevel, nextReview: nextReview(newLevel) });
    setFlipped(false);
    if (index + 1 >= dueWords.length) setDone(true);
    else setTimeout(() => setIndex(i => i + 1), 50);
  };

  return (
    <div className="page">
      <div className="daily-header">
        <div className="daily-icon">📅</div>
        <div>
          <div className="daily-count">{dueWords.length - index} 個單字</div>
          <div className="daily-label">今日待複習</div>
        </div>
      </div>
      <div className="mode-toggle" style={{marginBottom:16}}>
        <button className={`mode-btn${mode==="flash"?" active":""}`} onClick={() => { setMode("flash"); setFlipped(false); }}>翻轉卡片</button>
        <button className={`mode-btn${mode==="spell"?" active":""}`} onClick={() => setMode("spell")}>拼字練習</button>
      </div>
      <div className="progress-bar-wrap"><div className="progress-bar" style={{width:`${(index/dueWords.length)*100}%`}}/></div>

      {mode === "flash" ? (
        <>
          <div className="flashcard-wrap" onClick={() => setFlipped(f => !f)}>
            <div className={`flashcard-inner${flipped ? " flipped" : ""}`}>
              <div className="flashcard-face flashcard-front">
                <div className="fc-word">{w.word}</div>
                <div className="fc-pos">{w.pos}</div>
                <SpeakBtn text={w.word} style={{marginTop:8}} />
                <div className="fc-example" style={{marginTop:12, fontSize:13}}>{randEx(w).sentence}</div>
                <div className="fc-hint" style={{marginTop:12}}>點擊翻轉</div>
              </div>
              <div className="flashcard-face flashcard-back">
                <div className="fc-word">{w.word}</div>
                <div className="fc-pos" style={{marginBottom:12}}>{w.pos}</div>
                <div className="fc-defs">{w.definitions?.join("；")}</div>
                <div className="fc-example" style={{marginTop:8}}>"{randEx(w).sentence}"</div>
              </div>
            </div>
          </div>
          {flipped ? (
            <div className="fc-actions">
              <button className="fc-btn wrong" onClick={() => mark(false)}>✗ 不熟</button>
              <button className="fc-btn right" onClick={() => mark(true)}>✓ 認識</button>
            </div>
          ) : (
            <div style={{textAlign:"center",color:"var(--muted)",fontSize:14}}>翻轉後評分</div>
          )}
        </>
      ) : (
        <DailySpelling w={w} onDone={mark} />
      )}
    </div>
  );
}

function DailySpelling({ w, onDone }) {
  const [input, setInput] = useState([]);
  const [status, setStatus] = useState(null);
  const target = w.word.toLowerCase();

  useEffect(() => { setInput([]); setStatus(null); }, [w.id]);

  const press = (k) => {
    if (status) return;
    if (k === "⌫") { setInput(i => i.slice(0, -1)); return; }
    if (k === "✓") {
      if (input.length !== target.length) return;
      const correct = input.join("") === target;
      setStatus(correct ? "correct" : "wrong");
      return;
    }
    if (input.length < target.length) setInput(i => [...i, k]);
  };

  return (
    <>
      <div className="spell-word-display">
        <div className="spell-definition">{w.definitions?.[0]}</div>
        <div className="spell-example">"{w.example}"</div>
      </div>
      <div className="letter-boxes">
        {Array.from({ length: target.length }).map((_, i) => {
          const letter = status ? target[i] : input[i] || "";
          let cls = "letter-box";
          if (status === "correct") cls += " correct";
          else if (status === "wrong") cls += input[i] === target[i] ? " correct" : " wrong";
          else if (input[i]) cls += " filled";
          return <div key={i} className={cls}>{letter.toUpperCase()}</div>;
        })}
      </div>
      {status ? (
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:20,marginBottom:12}}>{status==="correct"?"🎉 正確！":"😅 " + target.toUpperCase()}</div>
          <button className="save-btn" onClick={() => onDone(status==="correct")}>下一個 →</button>
        </div>
      ) : (
        <div className="keyboard">
          {KEYBOARD.map((row, ri) => (
            <div key={ri} className="key-row">
              {row.map(k => <button key={k} className={`key${k.length>1?" wide":""}`} onClick={() => press(k)}>{k}</button>)}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ── Fill-in-the-Blank Page ─────────────────────────────────────────────────
function FillPage({ words, updateWord }) {
  const [index, setIndex] = useState(0);
  const [input, setInput] = useState("");
  const [status, setStatus] = useState(null); // null | correct | wrong
  const [ex, setEx] = useState(null);
  const inputRef = useRef(null);

  const pool = words.length > 0 ? words : [];

  const w = pool[index % Math.max(pool.length, 1)];

  // Pick a random example when word changes
  useEffect(() => {
    if (w) setEx(randEx(w));
    setInput("");
    setStatus(null);
    setTimeout(() => inputRef.current?.focus(), 100);
  }, [index, w?.id]);

  if (pool.length === 0) return (
    <div className="page">
      <div className="empty"><div className="empty-icon">✏️</div><p>還沒有單字，先去查一個吧！</p></div>
    </div>
  );

  const target = w.word.toLowerCase();

  const check = () => {
    if (!input.trim()) return;
    const correct = input.trim().toLowerCase() === target;
    setStatus(correct ? "correct" : "wrong");
    if (correct) updateWord(w.id, { level: Math.min(w.level+1,5), nextReview: nextReview(Math.min(w.level+1,5)) });
  };

  const next = () => {
    setIndex(i => (i + 1) % pool.length);
  };

  // Build sentence with blank
  const blank = "＿".repeat(Math.max(w.word.length, 3));
  const re = new RegExp(w.word, "gi");
  const sentence = ex?.sentence || "";
  const parts = sentence.split(re);

  const sentenceDisplay = status ? (
    <span>
      {parts.map((part, i) => (
        <span key={i}>
          {part}
          {i < parts.length - 1 && (
            <span style={{
              color: status === "correct" ? "var(--success)" : "var(--danger)",
              fontWeight: 600, fontStyle: "normal"
            }}>{w.word}</span>
          )}
        </span>
      ))}
    </span>
  ) : (
    <span>
      {parts.map((part, i) => (
        <span key={i}>
          {part}
          {i < parts.length - 1 && (
            <span style={{
              borderBottom: "2px solid var(--accent)",
              color: "var(--accent)",
              letterSpacing: 2,
              fontStyle: "normal",
              padding: "0 4px"
            }}>{blank}</span>
          )}
        </span>
      ))}
    </span>
  );

  return (
    <div className="page">
      <div className="fc-progress">{(index % pool.length) + 1} / {pool.length}</div>
      <div className="progress-bar-wrap">
        <div className="progress-bar" style={{width:`${((index%pool.length)+1)/pool.length*100}%`}}/>
      </div>

      {/* Sentence card */}
      <div style={{
        background:"var(--surface)", border:"1px solid var(--border)",
        borderRadius:20, padding:"28px 24px", marginBottom:20, minHeight:160,
        display:"flex", flexDirection:"column", justifyContent:"space-between"
      }}>
        <div style={{fontSize:10, textTransform:"uppercase", letterSpacing:"1.5px", color:"var(--muted)", fontFamily:"'DM Mono',monospace", marginBottom:12}}>
          填入正確的單字
        </div>
        <div style={{fontSize:17, lineHeight:1.8, fontStyle:"italic", color:"var(--text)", flexGrow:1}}>
          "{sentenceDisplay}"
        </div>
        {ex?.source && (
          <div style={{fontSize:10, color:"var(--accent2)", fontFamily:"'DM Mono',monospace", marginTop:12, textTransform:"uppercase", letterSpacing:"1px"}}>
            📰 {ex.source}
          </div>
        )}
      </div>

      {/* Definition hint */}
      <div style={{
        background:"rgba(232,197,71,0.06)", border:"1px solid rgba(232,197,71,0.15)",
        borderRadius:12, padding:"12px 16px", marginBottom:20
      }}>
        <div style={{fontSize:10, color:"var(--accent)", fontFamily:"'DM Mono',monospace", marginBottom:4, textTransform:"uppercase", letterSpacing:"1px"}}>提示</div>
        <div style={{fontSize:14, color:"var(--text)"}}>{w.definitions?.[0]}</div>
        <div style={{fontSize:12, color:"var(--muted)", marginTop:4}}>{w.pos} · {w.word.length} 個字母</div>
      </div>

      {/* Input */}
      {!status ? (
        <div style={{display:"flex", gap:10, marginBottom:16}}>
          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && check()}
            placeholder="輸入單字..."
            style={{
              flex:1, background:"var(--surface)", border:"1.5px solid var(--border)",
              borderRadius:12, padding:"14px 16px", color:"var(--text)",
              fontSize:16, fontFamily:"'DM Mono',monospace", outline:"none",
              transition:"border-color 0.2s"
            }}
            onFocus={e => e.target.style.borderColor="var(--accent)"}
            onBlur={e => e.target.style.borderColor="var(--border)"}
          />
          <button onClick={check} style={{
            background:"var(--accent)", border:"none", borderRadius:12,
            padding:"14px 20px", cursor:"pointer", fontSize:16, fontWeight:600,
            color:"#000", transition:"opacity 0.2s"
          }}>✓</button>
        </div>
      ) : (
        <div style={{marginBottom:16}}>
          <div style={{
            textAlign:"center", fontSize:22, marginBottom:8,
            color: status==="correct" ? "var(--success)" : "var(--danger)"
          }}>
            {status==="correct" ? "🎉 正確！" : `😅 正確答案：${w.word}`}
          </div>
          {ex?.translation && (
            <div style={{
              background:"var(--card)", borderRadius:10, padding:"10px 14px",
              fontSize:13, color:"var(--muted)", marginBottom:12, lineHeight:1.6
            }}>
              {ex.translation}
            </div>
          )}
          <button className="save-btn" onClick={next}>下一個 →</button>
        </div>
      )}

      {/* Shuffle hint */}
      {!status && (
        <div style={{textAlign:"center", color:"var(--muted)", fontSize:12}}>
          按 Enter 確認 · <span style={{cursor:"pointer", textDecoration:"underline"}} onClick={next}>跳過</span>
        </div>
      )}
    </div>
  );
}

// ── List Page ──────────────────────────────────────────────────────────────

        🔴 新學 → 🟡 學習中 → 🟢 熟悉
      </div>
    </div>
  );
}
